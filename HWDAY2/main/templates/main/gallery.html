{% extends 'main/base.html' %}
{% load static %}

{% block content %}
    <h1 class="page-title">My Image Gallery</h1>

    <div class="gallery-grid">
        <figure class="gallery-item">
            <!-- Ensure to place images in main/static/main/img/ folder -->
            <img src="{% static 'main/img/image1.jpg' %}" alt="Image 1">
            <figcaption>Beautiful Nature Landscape</figcaption>
        </figure>
        
        <figure class="gallery-item">
            <img src="{% static 'main/img/image2.jpg' %}" alt="Image 2">
            <figcaption>City Skyline at Sunset</figcaption>
        </figure>

        <figure class="gallery-item">
            <img src="{% static 'main/img/image3.jpg' %}" alt="Image 3">
            <figcaption>Abstract Art Painting</figcaption>
        </figure>
    </div>
{% endblock %}
