<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #fafafa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            border-left: 5px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        li:hover {
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .student-info {
            font-size: 1.1em;
            color: #555;
        }
        .name {
            font-weight: bold;
            color: #333;
        }
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .passed {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .failed {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .no-students {
            text-align: center;
            font-size: 1.2em;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Classroom Students</h1>
        {% if students %}
            <ul>
                {% for student in students %}
                    <li>
                        <div class="student-info">
                            <span class="name">{{ student.name }}</span> - Grade: {{ student.grade }}
                        </div>
                        <div class="status {% if student.passed %}passed{% else %}failed{% endif %}">
                            {% if student.passed %} Passed {% else %} Failed {% endif %}
                        </div>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="no-students">No students found.</p>
        {% endif %}
    </div>
</body>
</html>
